<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CPU対戦オセロ</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    background:#2e7d32;
    color:white;
}

#board{
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(8,60px);
    grid-template-rows:repeat(8,60px);
    width:480px;
    border:4px solid #1b5e20;
}

.cell{
    width:60px;
    height:60px;
    border:1px solid #1b5e20;
    background:#388e3c;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.disk{
    width:45px;
    height:45px;
    border-radius:50%;
}

.black{background:black;}
.white{background:white;}

#info{
    font-size:20px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
}

</style>
</head>

<body>

<h1>CPU対戦オセロ</h1>

<div id="info"></div>

<div id="board"></div>

<button onclick="initBoard()">リセット</button>

<script>

const boardSize=8
let board=[]
let currentPlayer=1
let gameOver=false

const boardElement=document.getElementById("board")
const info=document.getElementById("info")

function initBoard(){

    board=Array(boardSize).fill().map(()=>Array(boardSize).fill(0))

    board[3][3]=2
    board[3][4]=1
    board[4][3]=1
    board[4][4]=2

    currentPlayer=1
    gameOver=false

    drawBoard()
}

function drawBoard(){

    boardElement.innerHTML=""

    for(let y=0;y<8;y++){
        for(let x=0;x<8;x++){

            const cell=document.createElement("div")
            cell.className="cell"
            cell.dataset.x=x
            cell.dataset.y=y

            cell.addEventListener("click",playerMove)

            if(board[y][x]!==0){

                const disk=document.createElement("div")
                disk.className="disk "+(board[y][x]===1?"black":"white")
                cell.appendChild(disk)

            }

            boardElement.appendChild(cell)
        }
    }

    updateInfo()
}

function playerMove(e){

    if(gameOver) return
    if(currentPlayer!==1) return

    const x=parseInt(e.currentTarget.dataset.x)
    const y=parseInt(e.currentTarget.dataset.y)

    move(x,y,1)

    drawBoard()

    if(!gameOver){

        setTimeout(cpuMove,500)

    }

}

function move(x,y,player){

    if(board[y][x]!==0) return false

    const flips=getFlips(x,y,player)

    if(flips.length===0) return false

    board[y][x]=player

    flips.forEach(p=>{
        board[p.y][p.x]=player
    })

    currentPlayer=player===1?2:1

    checkGameEnd()

    return true
}

function cpuMove(){

    if(gameOver) return

    const moves=[]

    for(let y=0;y<8;y++){
        for(let x=0;x<8;x++){

            if(board[y][x]===0){

                if(getFlips(x,y,2).length>0){
                    moves.push({x,y})
                }

            }

        }
    }

    if(moves.length===0){

        currentPlayer=1
        drawBoard()
        return
    }

    const choice=moves[Math.floor(Math.random()*moves.length)]

    move(choice.x,choice.y,2)

    drawBoard()
}

function getFlips(x,y,player){

    const opponent=player===1?2:1

    const dirs=[
        {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1},
        {x:1,y:1},{x:-1,y:-1},{x:1,y:-1},{x:-1,y:1}
    ]

    let flips=[]

    dirs.forEach(d=>{

        let nx=x+d.x
        let ny=y+d.y
        let temp=[]

        while(nx>=0&&nx<8&&ny>=0&&ny<8){

            if(board[ny][nx]===opponent){

                temp.push({x:nx,y:ny})

            }else if(board[ny][nx]===player){

                flips=flips.concat(temp)
                break

            }else{

                break
            }

            nx+=d.x
            ny+=d.y
        }

    })

    return flips
}

function count(){

    let black=0
    let white=0

    board.forEach(r=>{
        r.forEach(c=>{
            if(c===1) black++
            if(c===2) white++
        })
    })

    return {black,white}
}

function hasMove(player){

    for(let y=0;y<8;y++){
        for(let x=0;x<8;x++){

            if(board[y][x]===0){

                if(getFlips(x,y,player).length>0){
                    return true
                }

            }

        }
    }

    return false
}

function checkGameEnd(){

    if(hasMove(currentPlayer)) return

    if(hasMove(currentPlayer===1?2:1)){

        currentPlayer=currentPlayer===1?2:1
        return

    }

    gameOver=true
}

function updateInfo(){

    const {black,white}=count()

    if(gameOver){

        let result="引き分け"

        if(black>white) result="黒の勝ち"
        if(white>black) result="白の勝ち"

        info.textContent=`ゲーム終了　黒:${black}　白:${white}　→ ${result}`

    }else{

        const turn=currentPlayer===1?"あなた(黒)":"CPU(白)"

        info.textContent=`ターン: ${turn}　黒:${black}　白:${white}`

    }

}

initBoard()

</script>

</body>
</html>
